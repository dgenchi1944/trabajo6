<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora </title>
    <link rel="stylesheet" href="/miEstilo.css">
</head>

<body>
    <center>
        <table id="tabla1" border="0" class="tab">
            <tbody>

                <tr>
                    <td>Núm 1:</td>
                    <td><input type="number" id="number1"></td>
                </tr>
                <tr>
                    <td>Núm 2:</td>
                    <td><input type="number" id="number2"></td>
                </tr>

                <tr>
                    <td>
                        <h1>suma</h1>
                    </td>
                    <td><input name="tm" type="radio" value="suma" checked></td>
                </tr>
                <tr>
                    <td>
                        <h1>resta</h1>
                    </td>
                    <td><input name="tm" type="radio" value="resta"></td>
                </tr>
                <tr>
                    <td>
                        <h1>multiplicacion</h1>
                    </td>
                    <td><input name="tm" type="radio" value="multi"></td>
                </tr>
                <tr>
                    <td>
                        <h1>divicion</h1>
                    </td>
                    <td><input name="tm" type="radio" value="divicion"></td>
                </tr>

                <tr>
                    <td colspan="2">
                        <button onclick="calculadora()">Calcular Resultado</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </center>
    <script src="js/miScript.js">
    </script>
</body>

</html>
